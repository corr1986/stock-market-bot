name: V1 Hourly Tracker

on:
  schedule:
    # 00:00-15:00 UTC = 08:00-23:00 Bali (UTC+8)
    # EU apre 08:00 UTC (XETRA 09:00 CEST), USA chiude 20:00 UTC (16:00 EDT)
    # Lunedì-Venerdì
    - cron: '0 0-15 * * 1-5'
  workflow_dispatch:

jobs:
  tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt numpy

      - name: Run tracker.py
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py

      - name: Commit portfolio.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio.json
          git diff --cached --quiet || git commit -m "chore: update v1 portfolio [tracker $(date +'%Y-%m-%d %H:%M')]"
          git push
