name: V1 Weekly Signal Selection

on:
  schedule:
    # Lunedì 05:30 UTC = Lunedì 13:30 Bali (UTC+8)
    - cron: '30 5 * * 1'
  workflow_dispatch:  # run manuale dal browser GitHub

jobs:
  weekly_signals:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt numpy

      - name: Run main.py
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit portfolio.json e signals.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio.json signals.json
          git diff --cached --quiet || git commit -m "chore: update v1 portfolio [weekly $(date +'%Y-%m-%d')]"
          git push
